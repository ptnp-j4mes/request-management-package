version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rm_postgres
    environment:
      POSTGRES_USER: rmuser
      POSTGRES_PASSWORD: rmpassword
      POSTGRES_DB: requestdb
    ports:
      - "65432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rmuser -d requestdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: rm_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://rmuser:rmpassword@postgres:5432/requestdb
      API_PORT: 9898
      API_HOST: 0.0.0.0
    ports:
      - "9898:9898"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: rm_web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9898
    ports:
      - "9899:9899"
    depends_on:
      - api

  meeting-bot:
    build:
      context: apps/meeting-bot
      dockerfile: Dockerfile
    container_name: rm_meeting_bot
    env_file: .env
    environment:
      DATABASE_URL: postgresql://rmuser:rmpassword@postgres:5432/requestdb
      MEETING_BOT_PROFILES_DIR: /app/bot_profiles
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - meeting_bot_profiles:/app/bot_profiles
    restart: unless-stopped

  # redis:
  #   image: redis:7-alpine
  #   container_name: rm_redis
  #   ports:
  #     - "6379:6379"

  # minio:
  #   image: minio/minio
